<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدعوة جهرًا — السيرة النبوية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6EFDD;
    --paper-2:#EFE4C8;
    --ink:#2B2116;
    --ink-dim:#6B5D45;
    --gold:#A9792C;
    --gold-deep:#7C5A20;
    --green:#3F5D42;
    --line:#D8C9A3;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Cairo',sans-serif;
    line-height:1.9;
    min-height:100vh;
    background-image:
      radial-gradient(ellipse at top right, rgba(169,121,44,.08), transparent 55%);
  }
  h1,.eyebrow{font-family:'Amiri',serif;}

  .top-nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 32px;
    border-bottom:1px solid var(--line);
    font-size:.95rem;
  }
  .top-nav a{
    color:var(--gold-deep);
    text-decoration:none;
    font-weight:600;
  }
  .top-nav a:hover{ color:var(--gold); }
  .top-nav .stage-tag{
    color:var(--ink-dim);
    font-size:.85rem;
  }

  header{
    text-align:center;
    padding:70px 20px 50px;
    border-bottom:1px solid var(--line);
    position:relative;
  }
  header::before{
    content:"";
    position:absolute;
    top:0; right:50%; transform:translateX(50%);
    width:120px; height:3px;
    background:var(--gold);
    opacity:.5;
  }
  .eyebrow{
    display:inline-block;
    color:var(--gold-deep);
    font-size:1rem;
    letter-spacing:.1em;
    margin-bottom:14px;
  }
  header h1{
    font-size:clamp(1.8rem,4.5vw,2.7rem);
    color:var(--ink);
    font-weight:700;
  }

  main{
    max-width:760px;
    margin:0 auto;
    padding:70px 24px;
  }
  .placeholder{
    border:1.5px dashed var(--gold);
    background:var(--paper-2);
    border-radius:10px;
    padding:60px 30px;
    text-align:center;
    color:var(--ink-dim);
  }
  .placeholder .icon{
    font-size:2rem;
    color:var(--gold-deep);
    margin-bottom:16px;
  }
  .placeholder p{ max-width:420px; margin:0 auto; }

  .bottom-nav{
    display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;
    max-width:760px;
    margin:0 auto;
    padding:0 24px 80px;
    font-size:.95rem;
  }
  .bottom-nav a{
    color:var(--ink-dim);
    text-decoration:none;
    border:1px solid var(--line);
    padding:10px 18px;
    border-radius:8px;
    transition:border-color .2s ease, color .2s ease, background .2s ease;
    background:var(--paper-2);
  }
  .bottom-nav a:hover{
    border-color:var(--gold);
    color:var(--gold-deep);
  }
</style>
</head>
<body>

<nav class="top-nav">

</nav>

<header>
  <span class="eyebrow">الدرس 6 من 46</span>
  <h1>الدعوة جهرًا</h1>
</header>

<main>

    <div class="icon">۞</div>
    <p>هذه الصفحة جاهزة الآن كإطار فارغ — أضف محتوى هذا الدرس هنا لاحقًا.</p>
  </div>
</main>

</div>

</body>
</html>
